services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lexiscope-app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=https://lexiscope.mooo.com
      - TRUSTED_PROXIES=*
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=lexiscope
      - DB_USERNAME=lexiscope
      - DB_PASSWORD=secret
    volumes:
      - app_storage:/var/www/html/storage

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=lexiscope
      - MYSQL_USER=lexiscope
      - MYSQL_PASSWORD=secret
      - MYSQL_ROOT_PASSWORD=rootsecret
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  python_worker:
    build:
      context: ./python_worker
      dockerfile: Dockerfile
    image: lexiscope-python-worker
    restart: unless-stopped
    environment:
      - LARAVEL_API_URL=http://app/api/ingest
      - GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  app_storage:
  db_data:
